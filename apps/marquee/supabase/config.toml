# Marquee's OWN local Supabase project, separate from the adapter's conformance
# DB so the app stays self-contained. Ports are offset +1000 from the adapter's
# (54321 -> 55321, ...) so both instances can run side by side.
project_id = "marquee"

[api]
enabled = true
port = 55321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
shadow_port = 55320
major_version = 17

[db.migrations]
enabled = true

[db.seed]
# Marquee seeds through the app's TypeScript seed (portable store), not SQL.
enabled = false

[realtime]
# Phase 4: live review counts/feed. Requires the watched tables in the
# supabase_realtime publication (migration 0004).
enabled = true

[studio]
enabled = false

[auth]
# Auth lands in Phase 3 (RLS + sign-in). Left enabled but unused in Phase 1.
enabled = true
site_url = "http://127.0.0.1:5174"

[storage]
# Phase 4: poster uploads via the file port (the `posters` bucket is created by
# the seed). 5 MiB cap is plenty for a poster image.
enabled = true
file_size_limit = "5MiB"

[analytics]
enabled = false
