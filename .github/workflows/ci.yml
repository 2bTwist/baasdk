name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (zero warnings, Definition of Done)
        run: pnpm exec biome ci --error-on-warnings .
      - name: Typecheck
        run: pnpm exec turbo run typecheck
      - name: Build (ESM-only)
        run: pnpm exec turbo run build
      - name: Test
        # The live Supabase conformance suite self-skips here: no Docker /
        # SUPABASE_URL on the runner. It runs locally against `supabase start`.
        run: pnpm exec vitest run

  boundaries:
    # Separate from lint so a violation reads as an architectural failure, not
    # lint noise: core imports no provider SDK, adapters don't import each other,
    # no cycles.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:boundaries

  lint-types:
    # Type-aware lint (typescript-eslint + the custom Result must-use rule).
    # Kept separate because typed lint is ~build-time cost; the rest of the
    # gate stays fast.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:types

  publish-guard:
    # publint + attw on the packed tarballs of the published packages, so a
    # broken exports map or type-resolution issue is caught before release.
    # (The .d.ts public-surface snapshot runs in `verify`, which builds first.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm lint:publish

  supabase-conformance:
    # M3 keystone: run the @baas/adapter-supabase live conformance suite against a
    # REAL Supabase stack on every commit, so "passes conformance" stops being a
    # local-only claim. ubuntu-latest ships Docker; macOS runners would not work.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinned (not `latest`): reproducible, and a CLI release can't break the
          # stack overnight. Matches the version the suite was validated against.
          version: 2.107.0
      - name: Start Supabase (Postgres + REST + Auth + Storage)
        # --workdir: the project (config.toml + migrations) lives under the adapter,
        # not the repo root. Migrations run on start (create todos/notes + bucket).
        # Exclude unused services; logflare+vector (analytics) are the usual CI flake.
        run: |
          supabase start --workdir packages/adapter-supabase \
            -x studio,imgproxy,realtime,edge-runtime,logflare,vector,supavisor,mailpit
      - name: Export Supabase env
        # `-o env` emits QUOTED values; strip the quotes before $GITHUB_ENV, and
        # keep only the two the fixture reads (SUPABASE_URL/_SERVICE_ROLE_KEY).
        run: |
          supabase status --workdir packages/adapter-supabase -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | grep -E '^(SUPABASE_URL|SUPABASE_SERVICE_ROLE_KEY)=' \
            | sed 's/"//g' >> "$GITHUB_ENV"
      - name: Run live conformance
        run: pnpm exec vitest run packages/adapter-supabase/test/conformance.test.ts
      - name: Stop Supabase
        if: always()
        run: supabase stop --workdir packages/adapter-supabase

  convex-conformance:
    # M3 part 2: run the @baas/adapter-convex live conformance suite against a
    # self-hosted Convex backend in Docker, so reactivity, real auth wiring, and
    # the file-upload dance are proven per-commit, not just locally.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start self-hosted Convex backend
        # Pinned by digest (the image tags are commit hashes, not semver) for
        # reproducibility; this is the digest the suite was validated against.
        # Origins point at localhost so generated upload URLs are reachable.
        # The instance secret is generated per-run (no hardcoded credential): the
        # admin key is read back from the container below, so it need not persist.
        run: |
          INSTANCE_SECRET="$(openssl rand -hex 32)"
          docker run -d --name convex-backend \
            -p 3210:3210 -p 3211:3211 \
            -e INSTANCE_NAME="ci-convex" \
            -e INSTANCE_SECRET="$INSTANCE_SECRET" \
            -e CONVEX_CLOUD_ORIGIN="http://127.0.0.1:3210" \
            -e CONVEX_SITE_ORIGIN="http://127.0.0.1:3211" \
            -e DISABLE_BEACON="true" \
            ghcr.io/get-convex/convex-backend@sha256:edd7959f3464ed661f6663f646db205d5d61bda606c969b074dfb3c69ed71463
      - name: Wait for backend readiness
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:3210/version >/dev/null 2>&1 && { echo "backend up"; exit 0; }
            sleep 2
          done
          echo "backend did not become ready"; docker logs convex-backend; exit 1
      - name: Deploy convex functions (test/convex via convex.json)
        # Run from the package: the CLI finds convex.json here and resolves its
        # `functions: test/convex/` relative to it (there is no --cwd flag). No
        # CONVEX_DEPLOYMENT is set on a fresh checkout, which self-hosted requires.
        working-directory: packages/adapter-convex
        run: |
          ADMIN_KEY="$(docker exec convex-backend ./generate_admin_key.sh | tr -d '\r' | tail -1)"
          CONVEX_SELF_HOSTED_URL="http://127.0.0.1:3210" \
          CONVEX_SELF_HOSTED_ADMIN_KEY="$ADMIN_KEY" \
            pnpm exec convex deploy
      - name: Run live conformance
        env:
          CONVEX_URL: http://127.0.0.1:3210
        run: pnpm exec vitest run packages/adapter-convex/test/conformance.test.ts
      - name: Teardown
        if: always()
        run: docker rm -f convex-backend || true

  dead-code:
    # knip: unused files, exports, and dependencies across the workspace. Keeps
    # the monorepo from accreting cruft as it grows. No build needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip

  size:
    # size-limit: bundle-size budget on @baas/core (success criterion A5). Builds
    # first, since it measures dist output.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm size

  changeset-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a changeset for publishable package src changes
        run: |
          # fetch-depth:0 above already has full history incl. origin/<base>;
          # a shallow re-fetch would truncate it and break the merge-base diff.
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          # Publishable packages only. @baas/conformance is ignored by changesets.
          if echo "$changed" | grep -Eq '^packages/(core|adapter-[^/]+)/src/'; then
            if ! echo "$changed" | grep -E '^\.changeset/[^/]+\.md$' | grep -qiv 'readme'; then
              echo "::error::A publishable package's src/ changed but no changeset was added. Run 'pnpm changeset'."
              exit 1
            fi
          fi

  all-green:
    # The single status branch protection requires. Stays stable as Phases 2-4
    # add more jobs to `needs`.
    if: always()
    needs:
      [verify, boundaries, lint-types, publish-guard, supabase-conformance, convex-conformance, dead-code, size, changeset-check]
    runs-on: ubuntu-latest
    steps:
      - name: Require all checks to pass
        run: |
          echo "verify=${{ needs.verify.result }} boundaries=${{ needs.boundaries.result }} lint-types=${{ needs.lint-types.result }} publish-guard=${{ needs.publish-guard.result }} supabase-conformance=${{ needs.supabase-conformance.result }} convex-conformance=${{ needs.convex-conformance.result }} dead-code=${{ needs.dead-code.result }} size=${{ needs.size.result }} changeset-check=${{ needs.changeset-check.result }}"
          # These must SUCCEED (never skipped). changeset-check is legitimately
          # skipped on push to main.
          for job in "verify:${{ needs.verify.result }}" "boundaries:${{ needs.boundaries.result }}" "lint-types:${{ needs.lint-types.result }}" "publish-guard:${{ needs.publish-guard.result }}" "supabase-conformance:${{ needs.supabase-conformance.result }}" "convex-conformance:${{ needs.convex-conformance.result }}" "dead-code:${{ needs.dead-code.result }}" "size:${{ needs.size.result }}"; do
            if [ "${job#*:}" != "success" ]; then
              echo "::error::${job%%:*} did not pass"
              exit 1
            fi
          done
          if [ "${{ needs.changeset-check.result }}" != "success" ] && [ "${{ needs.changeset-check.result }}" != "skipped" ]; then
            echo "::error::changeset-check did not pass"
            exit 1
          fi
