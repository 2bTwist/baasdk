name: Deploy demo to Pages

# Builds the in-memory demo (no backend, nothing to spam) and publishes it to
# GitHub Pages. Enable once in repo Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "packages/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build the in-memory demo
        run: |
          cp demo/config.example.js demo/config.js
          pnpm exec esbuild demo/app.ts --bundle --outfile=demo/bundle.js --platform=browser --format=esm
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
