name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22's bundled npm is
      # older. No long-lived NPM_TOKEN: npm detects the OIDC environment (the
      # id-token permission above) and authenticates without one. See RELEASING.md
      # for the one-time per-package trusted-publisher setup on npmjs.com.
      - run: npm install -g npm@latest
      - run: pnpm exec turbo run build
      # With pending changesets, this opens/updates a "Version Packages" PR (no
      # publish, no auth). It PUBLISHES only once that PR merges and the changesets
      # are consumed, via OIDC trusted publishing. Provenance is on (id-token +
      # NPM_CONFIG_PROVENANCE), and proves ORIGIN, not safety.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
