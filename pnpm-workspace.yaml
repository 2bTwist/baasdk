packages:
  - "packages/*"

# Build-script decisions. Global ignore-scripts=true is on for supply-chain
# hardening; these are the explicit per-dependency decisions pnpm requires.
# biome + turbo need their postinstall to fetch platform binaries (approved).
# esbuild ships its binary via @esbuild/<platform>, so its postinstall is not
# needed (declined — not run).
allowBuilds:
  "@biomejs/biome": true
  turbo: true
  esbuild: false
  # lefthook's binary resolves via its platform package; its postinstall only
  # runs `lefthook install`, which we run explicitly after writing lefthook.yml.
  lefthook: false
