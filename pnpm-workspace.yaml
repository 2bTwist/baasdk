packages:
  - "packages/*"

# Global ignore-scripts=true (npm/pnpm) is on for supply-chain hardening.
# These dev-tool binaries genuinely need their install scripts to fetch
# platform binaries, so they are explicitly approved here. esbuild ships its
# binary via the @esbuild/<platform> optional dependency, so it works even when
# its own postinstall is skipped.
onlyBuiltDependencies:
  - "@biomejs/biome"
  - turbo
